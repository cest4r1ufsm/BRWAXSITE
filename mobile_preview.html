<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Preview - BRWAX</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }

        .preview-container {
            width: 375px;
            height: 812px;
            /* iPhone X/11/12 Pro mockup size */
            background: #fff;
            border: 10px solid #333;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .preview-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #333;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            opacity: 0.5;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="preview-container">
        <!-- Load the main site inside an iframe -->
        <iframe src="index.html"></iframe>
    </div>

    <div class="info">iPhone X Simulated View (375x812)</div>

</body>

</html>
