backend:
  name: github
  repo: cest4r1ufsm/BRWAXSITE
  branch: main

media_folder: "assets/extracted_pdf_images"
public_folder: "assets/extracted_pdf_images"

collections:
  - name: "projects_data"
    label: "Projects"
    files:
      - name: "projects_list"
        label: "Projects List"
        file: "assets/projects_manifest.json"
        fields:
          - name: "projects"
            label: "Projects"
            widget: "list"
            fields:
              - name: "title"
                label: "Title"
                widget: "string"
              - name: "folder"
                label: "Folder Name (Unique ID)"
                widget: "string"
              - name: "description"
                label: "Description"
                widget: "text"
                required: false
              - name: "web_images"
                label: "Web Images"
                widget: "image"
                multiple: true
                hint: "Upload multiple images. Name files alphabetically (e.g. 01_capa.jpg, 02_foto.jpg) to control display order."
              - name: "mobile_images"
                label: "Mobile Images"
                widget: "image"
                multiple: true
                required: false
                hint: "Upload multiple images. Name files alphabetically (e.g. 01_capa.jpg, 02_foto.jpg) to control display order."

  - name: "site_info"
    label: "Site Information"
    files:
      - name: "info"
        label: "Information Modal"
        file: "assets/information.json"
        fields:
          - name: "text"
            label: "Text Content"
            widget: "text"
