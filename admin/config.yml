backend:
  name: github
  repo: cest4r1ufsm/BRWAXSITE
  branch: main

media_folder: "assets/extracted_pdf_images"
public_folder: "assets/extracted_pdf_images"

collections:
  - name: "projects_data"
    label: "Projects"
    files:
      - name: "projects_list"
        label: "Projects List"
        file: "assets/projects_manifest.json"
        fields:
          - name: "projects"
            label: "Projects"
            widget: "list"
            fields:
              - name: "title"
                label: "Title"
                widget: "string"
              - name: "folder"
                label: "Folder Name (Unique ID)"
                widget: "string"
              - name: "description"
                label: "Description"
                widget: "text"
                required: false
              - name: "web_images"
                label: "Web Images"
                widget: "list"
                field:
                  name: "image"
                  label: "Image"
                  widget: "image"
                  hint: "Upload or select an image for Web view"
              - name: "mobile_images"
                label: "Mobile Images"
                widget: "list"
                required: false
                field:
                  name: "image"
                  label: "Image"
                  widget: "image"
                  hint: "Upload or select an image for Mobile view"
